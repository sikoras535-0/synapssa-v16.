<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Synapssa v29 | Admin Sovereignty</title>
    <style>
        :root { --gold: #d4af37; --card: rgba(10, 10, 10, 0.98); --text: #f0f0f0; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Inter', sans-serif; color: var(--text); overflow-x: hidden; }
        .bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url('10603.jpg') no-repeat center center fixed; background-size: cover; filter: brightness(0.1); z-index: -1; }
        
        #gate, #password-reset-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:#000; display:flex; justify-content:center; align-items:center; z-index:9999; }
        .gate-box { text-align:center; border:1px solid var(--gold); padding:40px; background: #050505; border-radius: 12px; max-width: 400px; width: 90%; }

        .btn-gold-italic { 
            padding:12px 15px; border:1px solid var(--gold); cursor:pointer; font-weight:bold; font-style: italic; 
            background: transparent; color: var(--gold); text-transform:uppercase; margin: 10px 0; transition: 0.3s; display: block; width: 100%;
        }
        .btn-gold-italic:hover { background: var(--gold); color: #000; box-shadow: 0 0 15px var(--gold); }

        #app { display:none; padding:20px; max-width:1200px; margin:auto; text-align: center; }
        
        .progress-row { margin-bottom: 12px; text-align: left; background: rgba(255,255,255,0.03); padding: 10px; border-radius: 8px; border-left: 2px solid var(--gold); }
        .progress-label { font-size: 0.7rem; color: var(--gold); text-transform: uppercase; margin-bottom: 5px; display: flex; justify-content: space-between; }
        .progress-container { width: 100%; background: #222; border: 1px solid #333; height: 10px; border-radius: 5px; overflow: hidden; }
        .p-bar { height: 100%; background: var(--gold); width: 0%; transition: 0.5s ease; }

        .header-bar { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #333; margin-bottom: 15px; }
        .agent-icon { width: 120px; height: 120px; margin: 10px auto; border-radius: 50%; border: 3px solid var(--gold); overflow: hidden; cursor: pointer; box-shadow: 0 0 20px var(--gold); }
        .agent-icon img { width: 100%; height: 100%; object-fit: cover; }

        .grid { display:grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap:20px; text-align: left; }
        .card { background: var(--card); border: 1px solid #222; padding: 20px; border-radius: 12px; border-top: 3px solid var(--gold); }
        
        input, textarea { width:100%; padding:12px; margin:8px 0; background:#111; border:1px solid #333; color:#fff; box-sizing: border-box; font-size: 0.85rem; border-radius: 4px; }
        .user-list { max-height: 250px; overflow-y: auto; margin-top: 10px; }
        .file-link { color: var(--gold); text-decoration: none; font-size: 0.8rem; padding: 8px 0; display: block; border-bottom: 1px solid #222; }
    </style>
</head>
<body>

<div class="bg"></div>

<div id="gate">
    <div class="gate-box">
        <h2 style="color:var(--gold); letter-spacing: 5px; font-style: italic;">SYNAPSSA ACCESS</h2>
        <input type="text" id="user-id" placeholder="IDENTYFIKATOR (ID)">
        <input type="password" id="user-pass" placeholder="HASŁO">
        <button class="btn-gold-italic" onclick="handleLogin()">ZALOGUJ SYSTEM</button>
    </div>
</div>

<div id="password-reset-overlay" style="display:none;">
    <div class="gate-box">
        <h3 style="color:var(--gold);">ZMIANA HASŁA I RAPORT</h3>
        <input type="password" id="new-pass" placeholder="USTAW NOWE HASŁO">
        <input type="password" id="new-pass-confirm" placeholder="POTWIERDŹ HASŁO">
        <button class="btn-gold-italic" onclick="processPasswordChange()">ZAPISZ I WYŚLIJ DO ADMINA</button>
    </div>
</div>

<div id="app">
    <div class="header-bar">
        <span style="font-size: 0.7rem; color: var(--gold);">SECURE ID: <b id="display-id"></b> | ROLA: <b id="display-role"></b></span>
        <button class="btn-gold-italic" style="width:auto; font-size:0.6rem; padding: 5px 15px;" onclick="logout()">WYLOGUJ</button>
    </div>

    <div id="progress-monitor" class="card" style="margin-bottom: 20px;">
        <span style="color:var(--gold); font-weight:bold; font-size:0.8rem;">SYSTEM MONITOROWANIA</span>
        <div id="admin-view" style="display:none; margin-top:10px;">
            <input type="text" id="search-input" placeholder="Szukaj Beneficjenta..." onkeyup="renderAdminList()">
            <div class="user-list" id="admin-list-container"></div>
        </div>
        <div id="user-view" style="display:none; margin-top:10px;">
            <div class="progress-label">Postęp: <span id="user-prog-val">0%</span></div>
            <div class="progress-container"><div id="user-prog-bar" class="p-bar"></div></div>
        </div>
    </div>

    <div class="agent-icon" onclick="startBreathing()">
        <img src="10603.jpg" alt="Agent">
    </div>

    <div class="grid">
        <div class="card">
            <span style="color:var(--gold); font-weight:bold; font-size:0.8rem; display:block; margin-bottom:10px;">MATERIAŁY</span>
            <div id="files-list"></div>
        </div>
        <div class="card">
            <span style="color:var(--gold); font-weight:bold; font-size:0.8rem; display:block; margin-bottom:10px;">KOMUNIKACJA</span>
            <div id="action-panel"></div>
        </div>
        <div class="card">
            <span style="color:var(--gold); font-weight:bold; font-size:0.8rem; display:block; margin-bottom:10px;">FUNDACJA</span>
            <p style="font-size:0.65rem;">KONTO: xxxxxxxxxcccccxxxxxxxxx</p>
            <audio id="forest-audio" loop src="las.mp3"></audio>
            <button class="btn-gold-italic" id="f-btn" style="font-size: 0.6rem;" onclick="toggleForest()">LAS: ON</button>
        </div>
    </div>
</div>

<script>
    const SARA_MAIL = "sikorasara135@gmail.com";
    
    // TWOJE HASŁO ADMINA JEST TUTAJ:
    let db = JSON.parse(localStorage.getItem('syn_db_v29')) || {
        "Admin_Sara": { role: "ADMIN", pass: "Synapssa2026", progress: 0, isNew: false }
    };

    function handleLogin() {
        const id = document.getElementById('user-id').value;
        const pass = document.getElementById('user-pass').value;

        if (db[id]) {
            if (db[id].pass === pass) {
                if (db[id].isNew) {
                    localStorage.setItem('temp_id', id);
                    document.getElementById('gate').style.display = 'none';
                    document.getElementById('password-reset-overlay').style.display = 'flex';
                } else { launchApp(id); }
            } else { alert("Błędne hasło."); }
        } else {
            // Automatyczne tworzenie nowego usera przy pierwszej próbie z domyślnym hasłem
            if (pass === "Synapssa2026") {
                db[id] = { role: "USER_", pass: "Synapssa2026", progress: 0, isNew: true };
                localStorage.setItem('temp_id', id);
                document.getElementById('gate').style.display = 'none';
                document.getElementById('password-reset-overlay').style.display = 'flex';
                saveDB();
            } else { alert("Błąd ID lub Hasła."); }
        }
    }

    function processPasswordChange() {
        const id = localStorage.getItem('temp_id');
        const p1 = document.getElementById('new-pass').value;
        const p2 = document.getElementById('new-pass-confirm').value;

        if (p1 !== p2 || p1.length < 4) { alert("Hasła muszą być identyczne i mieć min. 4 znaki."); return; }

        db[id].pass = p1;
        db[id].isNew = false;
        saveDB();

        // NATYCHMIASTOWA WYSYŁKA DO SARY
        const body = `RAPORT BEZPIECZEŃSTWA\n-------------------\nUżytkownik ID: ${id}\nNOWE HASŁO: ${p1}\nROLA: ${db[id].role}`;
        window.location.href = `mailto:${SARA_MAIL}?subject=ZMIANA HASŁA: ${id}&body=${encodeURIComponent(body)}`;
        
        setTimeout(() => { launchApp(id); }, 1000);
    }

    function launchApp(id) {
        localStorage.setItem('active_id', id);
        document.getElementById('gate').style.display = 'none';
        document.getElementById('password-reset-overlay').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        
        const user = db[id];
        document.getElementById('display-id').innerText = id;
        document.getElementById('display-role').innerText = user.role;

        if (user.role === 'ADMIN') {
            document.getElementById('admin-view').style.display = 'block';
            document.getElementById('user-view').style.display = 'none';
            renderAdminList();
            renderAdminTools();
        } else {
            document.getElementById('admin-view').style.display = 'none';
            document.getElementById('user-view').style.display = 'block';
            updateUserBar(id);
            renderUserTools(id);
        }
        renderFiles();
    }

    function renderAdminList() {
        const container = document.getElementById('admin-list-container');
        container.innerHTML = "";
        Object.keys(db).forEach(id => {
            const u = db[id];
            container.innerHTML += `<div class="progress-row">${id} [${u.role}] - Postęp: ${u.progress}%</div>`;
        });
    }

    function renderAdminTools() {
        document.getElementById('action-panel').innerHTML = `
            <input type="email" id="target" placeholder="E-mail do...">
            <textarea id="admin-txt" placeholder="Treść wiadomości..."></textarea>
            <button class="btn-gold-italic" onclick="adminEmail()">WYŚLIJ JAKO SARA SIKORA</button>
        `;
    }

    function renderUserTools(id) {
        document.getElementById('action-panel').innerHTML = `<textarea id="user-txt" placeholder="Do Sary..."></textarea>
            <button class="btn-gold-italic" onclick="userEmail('${id}')">WYŚLIJ MATERIAŁY</button>`;
    }

    function adminEmail() {
        const t = document.getElementById('target').value;
        const b = document.getElementById('admin-txt').value;
        window.location.href = `mailto:${t}?cc=${SARA_MAIL}&subject=Synapssa Admin&body=${encodeURIComponent(b)}`;
    }

    function userEmail(id) {
        const b = document.getElementById('user-txt').value;
        db[id].progress += 1; saveDB(); updateUserBar(id);
        window.location.href = `mailto:${SARA_MAIL}?subject=Materiały od: ${id}&body=${encodeURIComponent(b)}`;
    }

    function renderFiles() {
        const list = document.getElementById('files-list');
        const files = ["Statut.pdf", "Wytyczne_IT.pdf"];
        list.innerHTML = files.map(f => `<a href="#" class="file-link" onclick="db['${localStorage.getItem('active_id')}'].progress+=1; saveDB(); launchApp('${localStorage.getItem('active_id')}');">📄 ${f}</a>`).join('');
    }

    function updateUserBar(id) {
        document.getElementById('user-prog-bar').style.width = db[id].progress + "%";
        document.getElementById('user-prog-val').innerText = db[id].progress + "%";
    }

    function logout() { localStorage.removeItem('active_id'); location.reload(); }
    function saveDB() { localStorage.setItem('syn_db_v29', JSON.stringify(db)); }
    function toggleForest() { const a = document.getElementById('forest-audio'); a.paused ? a.play() : a.pause(); }
    function startBreathing() {
        window.speechSynthesis.cancel();
        const m = new SpeechSynthesisUtterance("Wdech, wydech.");
        m.lang = 'pl-PL'; m.rate = 1.5; window.speechSynthesis.speak(m);
    }
</script>
</body>
</html>
