<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Synapssa v39 | Graphic Stability</title>
    <style>
        :root { --gold: #d4af37; --card: rgba(10, 10, 10, 0.9); --text: #f0f0f0; }
        
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Inter', sans-serif; background: #000; overflow: hidden; }

        /* STABILNE WARSTWY TŁA */
        .bg-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover; background-position: center; background-attachment: fixed;
            transition: opacity 0.8s ease-in-out; z-index: -2;
        }
        #bg-narcyz { background-image: url('9966.jpg'); opacity: 1; }
        #bg-dog { background-image: url('10603.jpg'); opacity: 0; }

        .bg-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0, 0, 0, 0.7); z-index: -1; 
        }

        /* INTERFEJS */
        #gate-screen, #app { position: relative; z-index: 10; height: 100vh; width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow-y: auto; }
        
        .box { 
            text-align:center; border: 1px solid var(--gold); padding: 40px; 
            background: var(--card); border-radius: 15px; max-width: 450px; width: 90%;
            backdrop-filter: blur(10px); box-shadow: 0 0 40px rgba(0,0,0,0.8);
        }

        .btn-gold { 
            padding:15px; border:1px solid var(--gold); cursor:pointer; font-weight:bold; 
            background: transparent; color: var(--gold); text-transform:uppercase; 
            margin: 15px 0; width: 100%; transition: 0.3s; letter-spacing: 2px;
        }
        .btn-gold:hover { background: var(--gold); color: #000; box-shadow: 0 0 20px var(--gold); }
        
        input { width:100%; padding:12px; margin:10px 0; background:rgba(20,20,20,0.8); border:1px solid #444; color:#fff; box-sizing: border-box; }

        /* TRZY ŚCIEŻKI */
        .sciezki-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px; width: 95%; max-width: 1200px; padding: 20px; }
        .sciezka-card { 
            background: var(--card); border: 1px solid #333; padding: 30px; border-radius: 20px; 
            border-top: 4px solid var(--gold); backdrop-filter: blur(5px);
        }
        
        .agent-icon { 
            width: 130px; height: 130px; margin: 0 auto 20px; border-radius: 50%; 
            border: 3px solid var(--gold); overflow: hidden; cursor: pointer; 
            box-shadow: 0 0 25px var(--gold); transition: transform 0.3s;
        }
        .agent-icon:hover { transform: scale(1.05); }
        .agent-icon img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

<div id="bg-narcyz" class="bg-layer"></div>
<div id="bg-dog" class="bg-layer"></div>
<div class="bg-overlay"></div>

<div id="gate-screen">
    <div class="box">
        <h2 style="color:var(--gold); font-style: italic; letter-spacing: 3px;">SYNAPSSA SOVEREIGN</h2>
        <p style="font-size: 0.7rem; color: var(--gold); margin-bottom: 20px;">REJESTRACJA W SYSTEMIE</p>
        <input type="text" id="r-id" placeholder="Pseudonim">
        <input type="email" id="r-mail" placeholder="E-mail">
        <input type="password" id="r-pass" placeholder="Hasło">
        <button class="btn-gold" onclick="launchSystem()">WEJDŹ DO ŚCIEŻEK</button>
    </div>
</div>

<div id="app" style="display:none;">
    <div style="width: 90%; display:flex; justify-content:space-between; margin-bottom:10px; font-size:0.8rem; color:var(--gold);">
        <span>ID: <b id="display-id"></b></span>
        <span style="cursor:pointer;" onclick="location.reload()">WYLOGUJ</span>
    </div>

    <div class="sciezki-grid">
        <div class="sciezka-card">
            <h3 style="color:var(--gold); font-size: 1rem;">I. DUCH</h3>
            <div class="agent-icon" onclick="startBreathing()">
                <img src="10603.jpg" alt="Space Dog">
            </div>
            <p style="font-size:0.75rem;">Kliknij psa, by aktywować oddech 3-3-3</p>
        </div>

        <div class="sciezka-card">
            <h3 style="color:var(--gold); font-size: 1rem;">II. WIEDZA</h3>
            <p style="font-size:0.8rem; margin: 15px 0; border-bottom: 1px solid #333; padding-bottom: 5px;">Statut_Fundacji.pdf</p>
            <p style="font-size:0.8rem; color:var(--gold);">Konto R&D: xxxxxxxxxcccccxxxxxxxxx</p>
        </div>

        <div class="sciezka-card">
            <h3 style="color:var(--gold); font-size: 1rem;">III. CZYŃ</h3>
            <textarea id="report" placeholder="Wiadomość do Sary..." style="width:100%; height:80px; background:#111; color:#fff; border:1px solid #444; padding:10px;"></textarea>
            <button class="btn-gold" style="font-size:0.7rem;" onclick="sendReport()">WYŚLIJ MATERIAŁY</button>
        </div>
    </div>
</div>

<script>
    function launchSystem() {
        const id = document.getElementById('r-id').value;
        const mail = document.getElementById('r-mail').value;
        if(!id || !mail) { alert("Wypełnij dane!"); return; }

        // STABILNA ZMIANA TŁA
        document.getElementById('bg-narcyz').style.opacity = "0";
        document.getElementById('bg-dog').style.opacity = "1";

        // PRZEŁĄCZENIE EKRANÓW
        document.getElementById('gate-screen').style.display = "none";
        document.getElementById('app').style.display = "flex";
        document.getElementById('display-id').innerText = id;

        // Kopia mailowa do Sary
        const body = `Nowy Suweren: ${id}\nE-mail: ${mail}`;
        window.location.href = `mailto:sikorasara135@gmail.com?subject=Rejestracja Synapssa&body=${encodeURIComponent(body)}`;
    }

    function sendReport() {
        const txt = document.getElementById('report').value;
        window.location.href = `mailto:sikorasara135@gmail.com?subject=Raport&body=${encodeURIComponent(txt)}`;
    }

    function startBreathing() {
        window.speechSynthesis.cancel();
        const m = new SpeechSynthesisUtterance("Spokojnie, oddychaj na trzy. Wdech: raz, dwa, trzy. Wstrzymaj: raz, dwa, trzy. Wydech: raz, dwa, trzy.");
        m.lang = 'pl-PL'; m.rate = 1.5;
        window.speechSynthesis.speak(m);
    }
</script>
</body>
</html>
