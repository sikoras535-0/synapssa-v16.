<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Synapssa v19.1 | Serenity Agent</title>
    <style>
        :root { --gold: #d4af37; --card: rgba(17, 17, 17, 0.85); --text: #f0f0f0; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', sans-serif; color: var(--text); overflow-x: hidden; }
        .background-image { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url('10603.jpg') no-repeat center center fixed; background-size: cover; filter: brightness(0.2); z-index: -1; }
        #gate { position: fixed; top:0; left:0; width:100%; height:100%; background:#000; display:flex; justify-content:center; align-items:center; z-index:9999; }
        #app { display:none; padding:30px; max-width:1200px; margin:auto; text-align: center; }
        .agent-container { margin: 40px auto; width: 250px; height: 250px; border-radius: 50%; border: 3px solid var(--gold); overflow: hidden; box-shadow: 0 0 50px rgba(212, 175, 55, 0.4); cursor: pointer; }
        .agent-img { width: 100%; height: 100%; object-fit: cover; }
        .btn-gold-italic { padding:14px 30px; border:1px solid var(--gold); cursor:pointer; font-weight:bold; font-style: italic; background: transparent; color: var(--gold); text-transform:uppercase; margin: 15px; }
        .speech-bubble { background: var(--card); border-radius: 20px; padding: 25px; margin: 30px auto; max-width: 650px; border: 1px solid #333; font-style: italic; color: var(--gold); }
    </style>
</head>
<body>
<div class="background-image"></div>
<div id="gate">
    <div style="text-align:center; border:1px solid var(--gold); padding:50px;">
        <h2 style="color:var(--gold); letter-spacing: 5px;">SYNAPSSA</h2>
        <input type="password" id="pass" placeholder="WPISZ KLUCZ" style="padding:12px; text-align:center; background:#111; color:#fff; border:1px solid #333;">
        <br><br>
        <button class="btn-gold-italic" onclick="unlock()">AUTORYZUJ</button>
    </div>
</div>
<div id="app">
    <div class="agent-container" onclick="speak()">
        <img src="10603.jpg" class="agent-img">
    </div>
    <div class="speech-bubble" id="message">"Witaj Pani Saro. System suwerenny v19.1 aktywny. Kliknij na mnie, aby usłyszeć raport."</div>
    <button class="btn-gold-italic" onclick="speak('System zabezpieczony. Status Low Risk.')">Status Systemu</button>
</div>
<script>
    function unlock() {
        if(document.getElementById('pass').value === 'Synapssa2026') {
            document.getElementById('gate').style.display = 'none';
            document.getElementById('app').style.display = 'block';
            speak("Witaj w systemie Synapssa.");
        } else { alert("Błąd"); }
    }
    function speak(txt) {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(txt || document.getElementById('message').innerText);
        msg.lang = 'pl-PL'; msg.pitch = 0.9; msg.rate = 0.8;
        window.speechSynthesis.speak(msg);
    }
</script>
</body>
</html>
