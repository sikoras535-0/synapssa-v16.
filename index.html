<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Synapssa v24 | Progress & Communication</title>
    <style>
        :root { --gold: #d4af37; --card: rgba(10, 10, 10, 0.95); --text: #f0f0f0; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Inter', sans-serif; color: var(--text); overflow-x: hidden; }
        
        .bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
               background: url('10603.jpg') no-repeat center center fixed; 
               background-size: cover; filter: brightness(0.15); z-index: -1; }

        #gate { position: fixed; top:0; left:0; width:100%; height:100%; background:#000; display:flex; justify-content:center; align-items:center; z-index:9999; }
        .gate-box { text-align:center; border:1px solid var(--gold); padding:40px; background: #050505; border-radius: 12px; }

        .btn-gold-italic { 
            padding:12px 20px; border:1px solid var(--gold); cursor:pointer; 
            font-weight:bold; font-style: italic; background: transparent; color: var(--gold);
            text-transform:uppercase; margin: 10px 0; transition: 0.3s; display: block; width: 100%;
        }
        .btn-gold-italic:hover { background: var(--gold); color: #000; box-shadow: 0 0 15px var(--gold); }

        #app { display:none; padding:20px; max-width:1100px; margin:auto; text-align: center; }
        
        /* PASEK POSTĘPU */
        .progress-container { width: 100%; background: #222; border: 1px solid var(--gold); height: 25px; margin: 20px 0; border-radius: 12px; overflow: hidden; position: relative; }
        #progress-bar { height: 100%; background: var(--gold); width: 0%; transition: 0.5s; }
        #progress-text { position: absolute; width: 100%; text-align: center; top: 0; font-size: 0.7rem; line-height: 25px; color: #fff; font-weight: bold; }

        .header-bar { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #333; margin-bottom: 20px; }

        .agent-icon { width: 150px; height: 150px; margin: 20px auto; border-radius: 50%; border: 3px solid var(--gold); overflow: hidden; cursor: pointer; box-shadow: 0 0 30px var(--gold); }
        .agent-icon img { width: 100%; height: 100%; object-fit: cover; }

        .grid { display:grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap:20px; text-align: left; }
        .card { background: var(--card); border: 1px solid #222; padding: 20px; border-radius: 12px; border-top: 3px solid var(--gold); }
        
        input, textarea { width:100%; padding:10px; margin:10px 0; background:#111; border:1px solid #333; color:#fff; box-sizing: border-box; }
        .path-title { color: var(--gold); text-transform: uppercase; font-weight: bold; font-size: 0.8rem; margin-bottom: 15px; display: block; }
    </style>
</head>
<body>

<div class="bg"></div>

<div id="gate">
    <div class="gate-box">
        <h2 style="color:var(--gold); letter-spacing: 5px;">SYNAPSSA ACCESS</h2>
        <input type="password" id="master-pass" placeholder="HASŁO: Synapssa2026">
        <button class="btn-gold-italic" onclick="login('ADMIN')">Ścieżka: ADMIN</button>
        <button class="btn-gold-italic" onclick="login('USER_')">Ścieżka: USER_</button>
        <button class="btn-gold-italic" onclick="login('UPRAWNIONA')">Ścieżka: UPRAWNIONA</button>
    </div>
</div>

<div id="app">
    <div class="header-bar">
        <span style="font-size: 0.7rem; color: var(--gold);">ZALOGOWANO: <b id="role-display"></b></span>
        <button class="btn-gold-italic" style="width:auto; font-size:0.6rem; padding: 5px 15px;" onclick="logout()">WYLOGUJ</button>
    </div>

    <div style="text-align: left; font-size: 0.7rem; color: var(--gold); margin-bottom: 5px;">POSTĘP NAUKI I INTEGRACJI:</div>
    <div class="progress-container">
        <div id="progress-bar"></div>
        <div id="progress-text">0%</div>
    </div>

    <div class="agent-icon" onclick="startBreathing()">
        <img src="10603.jpg" alt="Agent">
    </div>

    <div class="grid">
        <div class="card">
            <span class="path-title">Panel Operacyjny</span>
            <div id="path-content"></div>
        </div>

        <div class="card">
            <span class="path-title">Darowizny R&D</span>
            <p style="font-size: 0.75rem;">Wsparcie projektu Synapssa:</p>
            <p style="font-family: monospace; color: var(--gold); background: #000; padding: 10px; font-size: 0.8rem;">
                xxxxxxxxxcccccxxxxxxxxx
            </p>
            <button class="btn-gold-italic" style="font-size: 0.7rem;" onclick="alert('Skopiowano numer konta')">Kopiuj Dane</button>
        </div>

        <div class="card">
            <span class="path-title">Ambient Nature</span>
            <audio id="forest" loop src="las.mp3"></audio>
            <button class="btn-gold-italic" id="fbtn" style="font-size: 0.7rem;" onclick="toggleForest()">Szum Lasu: ON</button>
        </div>
    </div>
</div>

<script>
    let progress = parseInt(localStorage.getItem('syn_progress')) || 0;

    window.onload = () => {
        updateProgressUI();
        const r = localStorage.getItem('syn_role');
        if(r) showApp(r);
    };

    function login(role) {
        if(document.getElementById('master-pass').value === 'Synapssa2026') {
            localStorage.setItem('syn_role', role);
            showApp(role);
        } else { alert("Błąd"); }
    }

    function logout() {
        localStorage.removeItem('syn_role');
        location.reload();
    }

    function updateProgressUI() {
        document.getElementById('progress-bar').style.width = progress + "%";
        document.getElementById('progress-text').innerText = progress + "% UKOŃCZONE";
        localStorage.setItem('syn_progress', progress);
    }

    function addProgress() {
        if(progress < 100) {
            progress += 1;
            updateProgressUI();
        }
    }

    function showApp(role) {
        document.getElementById('gate').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        document.getElementById('role-display').innerText = role;
        
        const cnt = document.getElementById('path-content');
        if(role === 'ADMIN') {
            cnt.innerHTML = `
                <p style="font-size:0.8rem;">Witaj Pani Saro. Zarządzaj dokumentacją:</p>
                <input type="file" id="fup">
                <button class="btn-gold-italic" style="font-size:0.7rem;" onclick="addProgress()">Wgraj i Zatwierdź</button>
            `;
        } else if(role === 'USER_') {
            cnt.innerHTML = `
                <p style="font-size:0.8rem;">Wyślij materiały do Fundacji (Zwiększa postęp o 1%):</p>
                <textarea id="mailMsg" placeholder="Wpisz treść wiadomości..."></textarea>
                <button class="btn-gold-italic" style="font-size:0.7rem;" onclick="sendMail()">Wyślij do Sary Sikory</button>
            `;
        } else {
            cnt.innerHTML = `<p style="font-size:0.8rem;">Twoje certyfikaty są generowane na podstawie postępu.</p><button class="btn-gold-italic" style="font-size:0.7rem;" onclick="addProgress()">Generuj Raport</button>`;
        }
    }

    function sendMail() {
        const msg = document.getElementById('mailMsg').value;
        addProgress(); // Zwiększa pasek o 1%
        window.location.href = `mailto:sikorasara135@gmail.com?subject=Materialy od User Synapssa&body=${encodeURIComponent(msg)}`;
        alert("Poczta przygotowana. Twój postęp wzrósł o 1%!");
    }

    function startBreathing() {
        window.speechSynthesis.cancel();
        const m = new SpeechSynthesisUtterance("Spokojnie, oddychaj na trzy. Wdech: raz, dwa, trzy. Wstrzymaj: raz, dwa, trzy. Wydech: raz, dwa, trzy.");
        m.lang = 'pl-PL'; m.rate = 1.5; m.pitch = 1.2;
        window.speechSynthesis.speak(m);
    }

    function toggleForest() {
        const a = document.getElementById('forest');
        const b = document.getElementById('fbtn');
        if(a.paused) { a.play(); b.innerText = "Szum Lasu: OFF"; }
        else { a.pause(); b.innerText = "Szum Lasu: ON"; }
    }
</script>

</body>
</html>
