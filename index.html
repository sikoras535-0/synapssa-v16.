<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Synapssa Sovereign v49 | Enterprise Edition</title>
    <style>
        :root { 
            --gold: #d4af37; 
            --card: rgba(10, 10, 10, 0.95); 
            --text: #f0f0f0; 
            --glow: 0 0 20px rgba(212, 175, 55, 0.4);
        }
        body, html { 
            margin: 0; padding: 0; min-height: 100%; font-family: 'Inter', sans-serif; 
            background: #000; color: var(--text); scroll-behavior: smooth; overflow-x: hidden;
        }

        /* TŁA I PŁYNNE PRZEJŚCIA */
        .bg-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-size: cover; background-position: center; background-attachment: fixed; transition: opacity 1.2s ease-in-out; z-index: -2; }
        #bg-narcyz { background-image: url('9966.jpg'); opacity: 1; }
        #bg-dog { background-image: url('10603.jpg'); opacity: 0; }
        .bg-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.88); z-index: -1; }

        /* WSPÓLNE ELEMENTY UI */
        .box { text-align:center; border: 1px solid var(--gold); padding: 40px; background: var(--card); border-radius: 15px; width: 90%; max-width: 450px; backdrop-filter: blur(10px); box-shadow: var(--glow); }
        .btn-gold { padding:14px; border:1px solid var(--gold); cursor:pointer; font-weight:bold; background: transparent; color: var(--gold); text-transform:uppercase; margin: 8px 0; width: 100%; transition: all 0.3s ease; letter-spacing: 1px; border-radius: 5px; }
        .btn-gold:hover { background: var(--gold); color: #000; box-shadow: var(--glow); transform: translateY(-2px); }
        .btn-gold:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }
        
        input, textarea, select { width:100%; padding:12px; margin:8px 0; background:rgba(15,15,15,0.9); border:1px solid #444; color:#fff; border-radius: 5px; box-sizing: border-box; }

        /* PANEL GŁÓWNY */
        #app { display: none; padding: 40px 20px; max-width: 1400px; margin: auto; position: relative; z-index: 10; animation: fadeIn 1s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .header-bar { display:flex; justify-content:space-between; align-items:center; color:var(--gold); margin-bottom:40px; border-bottom:1px solid #333; padding-bottom:15px; }
        
        .sciezki-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 30px; }
        .sciezka-card { background: var(--card); border: 1px solid #222; padding: 30px; border-radius: 20px; border-top: 4px solid var(--gold); text-align: center; }
        
        .progress-container { width: 100%; background: #111; border-radius: 20px; height: 16px; margin: 15px 0; overflow: hidden; border: 1px solid #333; }
        .progress-bar { height: 100%; background: linear-gradient(90deg, #8a6d3b, #d4af37); width: 0%; transition: width 1.5s cubic-bezier(0.25, 0.8, 0.25, 1); }

        /* ADMIN & PAGINACJA */
        #admin-panel { margin-top: 60px; padding: 40px; border: 1px solid var(--gold); background: rgba(5,5,5,0.98); border-radius: 20px; }
        .user-table-wrapper { width: 100%; overflow-x: auto; border: 1px solid #333; border-radius: 10px; background: #0a0a0a; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        th { background: #151515; color: var(--gold); padding: 15px; text-align: left; border-bottom: 1px solid var(--gold); }
        td { padding: 12px; border-bottom: 1px solid #222; }
        
        .pagination-container { display: flex; justify-content: center; align-items: center; gap: 20px; margin-top: 20px; padding: 10px; }
        
        /* KRYPTACJA BOX */
        .enc-box { background: rgba(212, 175, 55, 0.05); border: 1px dashed var(--gold); padding: 15px; border-radius: 10px; margin-top: 15px; }
    </style>
</head>
<body>

<div id="bg-narcyz" class="bg-layer"></div>
<div id="bg-dog" class="bg-layer"></div>
<div class="bg-overlay"></div>

<div id="gate-screen" style="height:100vh; display:flex; justify-content:center; align-items:center;">
    <div class="box">
        <h2 style="color:var(--gold); letter-spacing: 4px;">SYNAPSSA</h2>
        <input type="text" id="reg-id" placeholder="Pseudonim">
        <input type="password" id="reg-pass" placeholder="Hasło">
        <select id="reg-role">
            <option value="BENEFICJENT">FORMA: BENEFICJENT</option>
            <option value="UPRAWNIONA">FORMA: UPRAWNIONA</option>
            <option value="ADMIN">FORMA: ADMIN (SARA SIKORA)</option>
        </select>
        <button class="btn-gold" onclick="login()">AUTORYZUJ WEJŚCIE</button>
        <button class="btn-gold" style="font-size:0.7rem; border-color:#444;" onclick="sendCert()">ZŁÓŻ CERTYFIKAT (PORT MAIL)</button>
    </div>
</div>

<div id="app">
    <div class="header-bar">
        <div>SUWEREN: <b id="u-name"></b> <span id="u-role" style="font-size:0.8rem; opacity:0.6"></span></div>
        <div style="display:flex; gap:10px;">
            <button onclick="exportUserData()" class="btn-gold" style="width:auto; padding:5px 15px; font-size:0.7rem;">EKSPORTUJ DANE (JSON)</button>
            <button onclick="location.reload()" class="btn-gold" style="width:auto; padding:5px 15px; font-size:0.7rem; border-color:red;">WYLOGUJ</button>
        </div>
    </div>

    <div class="sciezki-grid">
        <div class="sciezka-card">
            <h3>I. ŚCIEŻKA DUCHA</h3>
            <div onclick="startBreathing()" style="width:100px; height:100px; margin:auto; border-radius:50%; border:2px solid var(--gold); cursor:pointer; overflow:hidden;">
                <img src="10603.jpg" style="width:100%; height:100%; object-fit:cover;">
            </div>
            <div class="progress-container"><div id="p-duch" class="progress-bar"></div></div>
            <button class="btn-gold" onclick="updateUserProgress('p-duch', 100)">ZATWIERDŹ</button>
        </div>

        <div class="sciezka-card">
            <h3>II. ŚCIEŻKA WIEDZY</h3>
            <div class="progress-container"><div id="p-wiedza" class="progress-bar"></div></div>
            <button class="btn-gold" onclick="updateUserProgress('p-wiedza', 100)">ZATWIERDŹ</button>
        </div>

        <div class="sciezka-card">
            <h3>III. KRYPTACJA LOKALNA</h3>
            <div class="enc-box">
                <textarea id="plain-text" placeholder="Wpisz treść do zaszyfrowania..." style="height:60px; font-size:0.8rem;"></textarea>
                <button class="btn-gold" style="font-size:0.6rem;" onclick="localEncrypt()">ZAKODUJ DANE</button>
                <div id="cipher-output" style="font-size:0.6rem; word-break:break-all; color:var(--gold); margin-top:5px;"></div>
            </div>
            <textarea id="mail-msg" placeholder="Raport końcowy..." style="height:60px; margin-top:10px;"></textarea>
            <button class="btn-gold" onclick="sendUserMail()">WYŚLIJ RAPORT (PORT MAIL)</button>
        </div>
    </div>

    <div id="admin-panel" style="display:none;">
        <h3>PANEL ADMINISTRACYJNY (SKALOWALNOŚĆ 50k+)</h3>
        <div class="user-table-wrapper">
            <table>
                <thead>
                    <tr><th>PSEUDONIM</th><th>ROLA</th><th>HASŁO</th><th>PROGRES D.</th><th>PROGRES W.</th></tr>
                </thead>
                <tbody id="admin-table-body"></tbody>
            </table>
        </div>
        <div id="pagination-controls" class="pagination-container"></div>
    </div>
</div>

<script>
    let DB = JSON.parse(localStorage.getItem('synapssa_ultimate_db')) || [];
    let currentPage = 1;
    const rowsPerPage = 20;

    function login() {
        const id = document.getElementById('reg-id').value;
        const pass = document.getElementById('reg-pass').value;
        const role = document.getElementById('reg-role').value;
        if(!id || !pass) return alert("Podaj dane.");

        let user = DB.find(u => u.id === id);
        if(!user) {
            user = {id, pass, role, pDuch: 0, pWiedza: 0};
            DB.push(user);
            saveDB();
        }

        document.getElementById('u-name').innerText = id;
        document.getElementById('u-role').innerText = role;
        document.getElementById('gate-screen').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        document.getElementById('bg-narcyz').style.opacity = '0';
        document.getElementById('bg-dog').style.opacity = '1';

        document.getElementById('p-duch').style.width = user.pDuch + '%';
        document.getElementById('p-wiedza').style.width = user.pWiedza + '%';

        if(role === "ADMIN") {
            document.getElementById('admin-panel').style.display = 'block';
            refreshAdminTable();
        }
    }

    function saveDB() { localStorage.setItem('synapssa_ultimate_db', JSON.stringify(DB)); }

    function updateUserProgress(barId, val) {
        document.getElementById(barId).style.width = val + '%';
        const name = document.getElementById('u-name').innerText;
        let user = DB.find(u => u.id === name);
        if(user) {
            user[barId === 'p-duch' ? 'pDuch' : 'pWiedza'] = val;
            saveDB();
            if(document.getElementById('u-role').innerText === "ADMIN") refreshAdminTable();
        }
    }

    // --- LOGIKA PAGINACJI ---
    function refreshAdminTable() {
        const tbody = document.getElementById('admin-table-body');
        const totalPages = Math.ceil(DB.length / rowsPerPage);
        
        if (currentPage > totalPages) currentPage = totalPages || 1;
        
        const start = (currentPage - 1) * rowsPerPage;
        const end = start + rowsPerPage;
        const paginated = DB.slice(start, end);

        tbody.innerHTML = paginated.map(u => `
            <tr>
                <td><b>${u.id}</b></td><td>${u.role}</td>
                <td><code style="color:var(--gold)">${u.pass}</code></td>
                <td>${u.pDuch}%</td><td>${u.pWiedza}%</td>
            </tr>
        `).join('');

        renderPagination(totalPages);
    }

    function renderPagination(total) {
        const cont = document.getElementById('pagination-controls');
        cont.innerHTML = `
            <button class="btn-gold" style="width:auto" onclick="changePage(-1)" ${currentPage===1?'disabled':''}> < </button>
            <span style="font-size:0.8rem">STRONA ${currentPage} / ${total || 1}</span>
            <button class="btn-gold" style="width:auto" onclick="changePage(1)" ${currentPage===total || total===0 ?'disabled':''}> > </button>
        `;
    }

    function changePage(s) { currentPage += s; refreshAdminTable(); }

    // --- DODATKOWE STANDARDY ---
    function localEncrypt() {
        const txt = document.getElementById('plain-text').value;
        if(!txt) return;
        const enc = btoa(encodeURIComponent(txt)); // Suwerenna warstwa 1
        document.getElementById('cipher-output').innerText = enc;
    }

    function exportUserData() {
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(DB));
        const downloadAnchorNode = document.createElement('a');
        downloadAnchorNode.setAttribute("href", dataStr);
        downloadAnchorNode.setAttribute("download", "synapssa_backup.json");
        document.body.appendChild(downloadAnchorNode);
        downloadAnchorNode.click();
        downloadAnchorNode.remove();
    }

    function startBreathing() {
        window.speechSynthesis.cancel();
        const m = new SpeechSynthesisUtterance("Wdech... raz, dwa, trzy. Zatrzymaj... raz, dwa, trzy. Wydech... raz, dwa, trzy.");
        m.lang = 'pl-PL'; m.rate = 0.8;
        window.speechSynthesis.speak(m);
    }

    function sendUserMail() {
        const msg = document.getElementById('mail-msg').value;
        const enc = document.getElementById('cipher-output').innerText;
        window.location.href = `mailto:sikorasara135@gmail.com?subject=RAPORT&body=Treść: ${msg}%0A%0AEncrypted: ${enc}`;
    }

    function sendCert() {
        const id = document.getElementById('reg-id').value;
        window.location.href = `mailto:sikorasara135@gmail.com?subject=CERTYFIKAT&body=Dla: ${id}`;
    }
</script>
</body>
</html>
